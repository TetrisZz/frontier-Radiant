- type: entity
  id: MobCatBobik
  parent: [NFMobPet, MobCorgiGhost]
  name: Бомбик
  description: Просить у него помощни точно не стоит. 
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _radiant/Mobs/Pets/dogsep.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: secdog
  - type: DamageStateVisuals
    states:
      Alive:
        Base: secdog
        BaseUnshaded: mask_null
      Critical:
        Base: secdog_crit
        BaseUnshaded: mask_null
      Dead:
        Base: secdog_dead
        BaseUnshaded: mask_null
  - type: Speech
    speechSounds: Vulpkanin
    speechVerb: Vulpkanin
    allowedEmotes: ['Bark', 'Snarl', 'Whine', 'Howl', 'Awoo', 'Growl']
  - type: GhostRole
    name: бомбик
    description: Просить у него помощи точно не стоит. 
    rules: ghost-role-information-nonantagonist-rules
    prototype: MobCorgiGhost
    mindRoles: [ MindRoleGhostRoleNeutral ]
  - type: RandomMetadata
    nameSegments: null
  - type: AutoImplant
    implants:
    - MindShieldImplant
    - MedicalTrackingImplant
  - type: Butcherable
    spawned:
    - id: FoodMeatCat
      amount: 1
#    - id: MaterialHideClippy
  - type: IntrinsicRadioTransmitter
    channels:
    - Service
  - type: ActiveRadio
    channels:
    - Service
  - type: NpcFactionMember
    factions:
      - Cat
      - PetsNT
  - type: ShowJobIcons

- type: entity
  name: Фенек
  parent: [SimpleMobBase, StripableInventoryBase]
  id: MobFen
  description: Магический фенек, который приносит удачу.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _radiant/Mobs/Pets/fen.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: fox
  - type: SpriteMovement
    movementLayers:
      movement:
        state: fox-moving
    noMovementLayers:
      movement:
        state: fox
  - type: Carriable 
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50 
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Inventory
    speciesId: fox
    templateId: pet
  - type: DamageStateVisuals
    states:
      Alive:
        Base: fox
      Critical:
        Base: fox_dead
      Dead:
        Base: fox_dead
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 3
  - type: InteractionPopup
    successChance: 0.5
    interactSuccessString: petting-success-soft-floofy
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      collection: Fox
  - type: Grammar
    attributes:
      gender: epicene
  - type: Bloodstream
    bloodMaxVolume: 100
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Piercing: 8
  - type: NpcFactionMember
    factions:
    - Passive
  - type: NPCRetaliation
    attackMemoryLength: 10
  - type: HTN
    rootTask:
      task: RuminantHostileCompound
  - type: Tag
    tags:
    - VimPilot

- type: entity
  suffix: Ghost
  parent: [BaseEmotionalGhost, MobFen]
  id: MobFenGhost
  components:
  - type: ReplacementAccent
    accent: fox
  - type: Vocal
    sounds:
      Male: Fox
      Female: Fox
      Unsexed: Fox
  - type: RandomMetadata
    nameSegments: [NamesCatSpace]
  - type: Inventory
    speciesId: fox

- type: entity
  name: домашняя свинья
  parent: [SimpleMobBase, StripableInventoryBase]
  id: MobPigRS
  description: Oink.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: pig
      sprite: _radiant/Mobs/Pets/pig.rsi
  - type: Carriable #DeltaV
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 250
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Inventory
    speciesId: pig
    templateId: pet
  - type: Tag
    tags:
    - DoorBumpOpener
    - Pig
    - VimPilot
  - type: Reproductive
    partnerWhitelist:
      tags:
      - Pig
    offspring:
    - id: MobPig
  - type: ReproductivePartner
  - type: DamageStateVisuals
    states:
      Alive:
        Base: pig
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: Butcherable
    spawned:
    - id: FoodMeatBacon
      amount: 6
  - type: Grammar
    attributes:
      gender: epicene
  - type: InteractionPopup
    successChance: 0.7
    interactSuccessString: petting-success-pig
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/pig_oink.ogg
  - type: ReplacementAccent
    accent: pig
  - type: SentienceTarget
    flavorKind: station-event-random-sentience-flavor-organic
  - type: NpcFactionMember
    factions:
    - Passive
  - type: HTN
    rootTask:
      task: RuminantCompound

- type: entity
  suffix: Ghost
  parent: [BaseEmotionalGhost, MobPigRS]
  id: MobPigRSGhost
  components:
  - type: ReplacementAccent
    accent: pig
  - type: Vocal
    sounds:
      Male: pig
      Female: pig
      Unsexed: pig
  - type: RandomMetadata
    nameSegments: [NamesCatSpace]
  - type: Inventory
    speciesId: pig