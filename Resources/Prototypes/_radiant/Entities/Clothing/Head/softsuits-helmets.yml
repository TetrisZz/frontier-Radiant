- type: entity
  parent: ClothingHeadEVAHelmetWithLightBase
  id: ClothingHeadEVAHelmetPurpleBlack
  name: purple-black EVA helmet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _NF/Clothing/Head/Helmets/eva_color.rsi
    layers:
    - state: icon-base
      color: "#1e1d1f"
    - state: icon-reinforced-points
      color: "#333333"
    - state: icon-visor
      color: "#5a3074"
  - type: Clothing
    sprite: _NF/Clothing/Head/Helmets/eva_color.rsi
    clothingVisuals:
      head:
      - state: equipped-head-base
        color: "#1e1d1f"
      - state: equipped-head-reinforced-points
        color: "#333333"
      - state: equipped-head-visor
        color: "#5a3074"

