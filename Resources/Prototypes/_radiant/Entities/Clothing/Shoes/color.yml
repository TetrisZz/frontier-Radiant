- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesColorSandalsDeepBlack
  name: черные босоножки
  description: Поглощают свет и внимание.
  components:
  - type: Sprite
    sprite: _radiant/Clothing/Boots/sandals.rsi
    layers:
    - state: icon
      color: "#2b2b2b"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#2b2b2b"
      right:
      - state: inhand-right
        color: "#2b2b2b"
  - type: Clothing
    sprite: _radiant/Clothing/Boots/sandals.rsi
    clothingVisuals:
      shoes:
      - state: equipped-FEET
        color: "#141414"
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHighHeels
      params:
        volume: -6
        variation: 0.09
  - type: StaticPrice 
    price: 100
    vendPrice: 2000 

