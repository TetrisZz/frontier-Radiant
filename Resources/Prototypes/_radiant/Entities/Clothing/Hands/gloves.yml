  name: кастеты
  description: Тяжёлый ударный кастет премиального класса, выполненный в фирменной стилистике Aurora Armaments. Его форма сочетает строгую геометрию и агрессивные линии, а в центре корпуса размещена ало-красная эмблема Aurora - символ контроля и силы.
  components:
  - type: Sprite
    scale: 0.3, 0.3
    sprite: _radiant/Clothing/Hands/KnuckleDusters/knuckledusterbig.rsi
    state: knuckleduster
  - type: Clothing
    sprite: _radiant/Clothing/Hands/KnuckleDusters/knuckleduster.rsi
