    attackRate: 1.5
    damage:
      types:
        Blunt: 8
        Piercing: 8
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true
  - type: Tag
    tags:
    - WhitelistChameleon
    - Kangaroo
  - type: StaticPrice
    price: 2000