- type: entity
  categories: [ HideSpawnMenu ]
  id: LockerWallEVAColorPurpleBlack
  parent: NFBaseLockerGridInvWallColor
  name: настенный шкаф EVA скафандра ученого
  description: Темный шкаф для хранения черно-фиолетового EVA скафандра ученого.
  components:
    - type: Sprite
      layers:
      - state: base
        map: ["enum.StorageVisualLayers.Base"]
        color: "#1e1d1f"
      - state: fillEva-0
        map: ["enum.StorageFillLayers.Fill"]
      - state: door
        map: ["enum.StorageVisualLayers.Door"]
        color: "#1e1d1f"
      - state: door-decal-line-01
        map: [ decal1 ]
        color: "#333333"
      - state: door-decal-eva-02
        map: [ decal2 ]
        color: "#5a3074"
      - state: welded
        visible: false
        map: ["enum.WeldableLayers.BaseWelded"]
      - state: locked
        map: ["enum.LockVisualLayers.Lock"]
    - type: StorageFillVisualizer
      maxFillLevels: 6
      fillBaseName: fillEva

