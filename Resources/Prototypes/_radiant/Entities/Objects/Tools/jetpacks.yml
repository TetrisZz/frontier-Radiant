# Infinite jetpack
- type: entity
  parent: JetpackSecurity
  id: JetpackCombatBorg
  name: джетпак борга
  suffix: Бесконечный
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      volume: 5
      temperature: 293.15
  - type: Jetpack
    moleUsage: 0
  - type: MovementSpeedModifier
    weightlessAcceleration: 1.3
    weightlessFriction: 0.3
    weightlessModifier: 1

