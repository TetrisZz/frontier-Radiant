- type: entity
  abstract: true
  parent: BaseItem
  id: BaseBlueSpaceTicket
  name: ship voucher
  description: Used for free shuttle rentals from a shipyard.
  components:
  - type: Sprite
    sprite: _radiant/Objects/Misc/voucher.rsi
    layers:
    - state: bluespace_acorp
  - type: Item
    size: Small
    heldPrefix: default
    storedRotation: -90
  - type: StaticPrice
    price: 0
  - type: CargoSellBlacklist
  - type: DeleteOnTrigger
